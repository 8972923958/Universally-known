<!DOCTYPE html>
<html>
<head>
<title>Universally Know</title>

<style>
body{
    background:#1e1e1e;
    color:white;
    font-family:Arial;
    text-align:center;
}

.card{
    border:2px solid white;
    padding:10px;
    margin:10px;
    display:inline-block;
    width:160px;
    background:#333;
}

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}

#log{
    margin-top:20px;
    text-align:left;
    width:60%;
    margin-left:auto;
    margin-right:auto;
    background:#111;
    padding:10px;
    height:200px;
    overflow:auto;
}
</style>

</head>

<body>

<h1>Universally Know</h1>

<p>Treasure Cards Left: <span id="treasure">20</span></p>

<h2>Your Monster</h2>
<div id="playerCard" class="card"></div>

<h2>Enemy Monster</h2>
<div id="enemyCard" class="card"></div>

<button onclick="attack()">Attack</button>
<button onclick="heal()">Heal</button>

<h2>Battle Log</h2>
<div id="log"></div>

<script>

/* --------------------
   GAME DATA
-------------------- */

let treasure = 20;

let player = {
    name:"EA Bull",
    hp:1200,
    atk:1000,
    sh:500,
    maxHp:1200
};

let enemy = {
    name:"Lava Wolf",
    hp:1000,
    atk:900,
    sh:300,
    maxHp:1000
};

/* --------------------
   DRAW CARDS
-------------------- */

function draw(){
    document.getElementById("playerCard").innerHTML =
    `<b>${player.name}</b><br>
    HP: ${player.hp}/${player.maxHp}<br>
    ATK: ${player.atk}<br>
    SH: ${player.sh}`;

    document.getElementById("enemyCard").innerHTML =
    `<b>${enemy.name}</b><br>
    HP: ${enemy.hp}/${enemy.maxHp}<br>
    ATK: ${enemy.atk}<br>
    SH: ${enemy.sh}`;

    document.getElementById("treasure").innerText = treasure;
}

/* --------------------
   ATTACK SYSTEM
-------------------- */

function attack(){

    let damage = player.atk - enemy.sh;
    if(damage < 0) damage = 0;

    enemy.hp -= damage;

    log("You attacked for " + damage);

    if(enemy.hp <= 0){
        treasure--;
        log("Enemy defeated! Treasure taken.");
        enemy.hp = enemy.maxHp;
    }

    enemyTurn();
    draw();
}

/* --------------------
   HEAL SYSTEM (H)
-------------------- */

function heal(){

    let healAmount = 200;

    player.hp += healAmount;

    if(player.hp > player.maxHp){
        player.hp = player.maxHp;
    }

    log("You healed " + healAmount);

    enemyTurn();
    draw();
}

/* --------------------
   ENEMY TURN
-------------------- */

function enemyTurn(){

    let damage = enemy.atk - player.sh;
    if(damage < 0) damage = 0;

    player.hp -= damage;

    log("Enemy attacked for " + damage);

    if(player.hp <= 0){
        alert("You Lost!");
        location.reload();
    }
}

/* --------------------
   LOG SYSTEM
-------------------- */

function log(text){
    document.getElementById("log").innerHTML += text + "<br>";
}

/* --------------------
   START GAME
-------------------- */

draw();

</script>

</body>
</html>
